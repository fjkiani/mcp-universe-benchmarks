name: Validate and Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "domains/**"
      - "mcpbench/**"
      - "servers/**"
      - "scripts/**"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to validate (e.g., web_search) or 'all'"
        required: false
        type: string
        default: "all"
      run_benchmark:
        description: "Run live benchmark (requires API keys)"
        required: false
        type: boolean
        default: false
      model:
        description: "Model slug for benchmark run"
        required: false
        type: string
        default: "openrouter/openai/gpt-oss-20b:free"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.pull_request.title || '', '[skip ci]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Validate all domains
        run: |
          DOMAIN="${{ inputs.domain || 'all' }}"
          if [ "$DOMAIN" = "all" ]; then
            uv run python -m mcpbench validate --all
          else
            uv run python -m mcpbench validate --domain "$DOMAIN"
          fi

      - name: List available models
        run: uv run python -m mcpbench list-models

  benchmark:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.run_benchmark == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run benchmark
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DOMAIN="${{ inputs.domain || 'investments' }}"
          MODEL="${{ inputs.model }}"
          uv run python -m mcpbench run --domain "$DOMAIN" --models "$MODEL" --runs 1

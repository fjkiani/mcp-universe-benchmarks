name: Sync Domains to Mothership Repository

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      domain_name:
        description: 'Domain name to sync (leave empty to sync all domains)'
        required: false
        type: string
      branch:
        description: 'Target branch in mothership repo'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Dry run (no changes made)'
        required: false
        default: false
        type: boolean

jobs:
  sync-to-mothership:
    # Only run on merged PRs or manual trigger
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout template repo with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_ACCESS_TOKEN_WORKFLOW }}

      - name: Verify submodules
        run: |
          echo "Submodule status:"
          git submodule status
          echo ""
          echo "Submodules initialized successfully"

      - name: Determine sync scope
        id: sync-scope
        run: |
          if [ -n "${{ inputs.domain_name }}" ]; then
            SYNC_MODE="single"
            DOMAIN_NAME="${{ inputs.domain_name }}"
            echo "mode=single" >> $GITHUB_OUTPUT
            echo "domain=$DOMAIN_NAME" >> $GITHUB_OUTPUT
            echo "📦 Syncing single domain: $DOMAIN_NAME"
          else
            SYNC_MODE="all"
            echo "mode=all" >> $GITHUB_OUTPUT
            echo "📦 Syncing all domains"
          fi

      - name: Clone mothership repository
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN_WORKFLOW }}
        run: |
          echo "🔄 Cloning mothership repository..."
          # Update this URL to match your actual mothership repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/Alignerr-Code-Labeling/lbx_mcp_universe_mothership.git mothership
          cd mothership
          git checkout ${{ inputs.branch || 'main' }}

      - name: Sync domains folder
        id: sync-domains
        run: |
          mkdir -p mothership/domains

          if [ "${{ steps.sync-scope.outputs.mode }}" = "single" ]; then
            DOMAIN="${{ steps.sync-scope.outputs.domain }}"
            echo "📁 Syncing single domain: $DOMAIN"

            # Verify domain exists in template repo
            if [ ! -d "domains/$DOMAIN" ]; then
              echo "::error::Domain '$DOMAIN' not found in template repo"
              exit 1
            fi

            # Copy domain (overwrites if exists, but doesn't delete other domains)
            cp -r domains/$DOMAIN mothership/domains/

            # Save synced domain to output
            echo "domains=$DOMAIN" >> $GITHUB_OUTPUT

            echo "✅ Synced domain: $DOMAIN"
          else
            echo "📁 Syncing all domains from template repo"

            # Track which domains were synced
            SYNCED_DOMAINS=""

            # Only sync domains that exist in the template repo
            # This preserves domains in mothership that don't exist in template repo
            for domain_dir in domains/*/; do
              if [ -d "$domain_dir" ]; then
                domain_name=$(basename "$domain_dir")
                echo "📦 Syncing domain: $domain_name"
                cp -r "$domain_dir" mothership/domains/
                if [ -z "$SYNCED_DOMAINS" ]; then
                  SYNCED_DOMAINS="$domain_name"
                else
                  SYNCED_DOMAINS="$SYNCED_DOMAINS $domain_name"
                fi
              fi
            done

            # Save synced domains to output
            echo "domains=$SYNCED_DOMAINS" >> $GITHUB_OUTPUT

            echo "✅ Synced all domains from template repo"
          fi

      - name: Sync supporting tools and base files
        run: |
          echo "🔧 Syncing CLI and base files..."

          # Sync lbx_mcp_universe_cli (git submodule)
          rm -rf mothership/lbx_mcp_universe_cli
          cp -r lbx_mcp_universe_cli mothership/

          # Remove submodule git reference to avoid "not a git repository" errors
          # The mothership will manage this as its own submodule
          if [ -f "mothership/lbx_mcp_universe_cli/.git" ]; then
            rm mothership/lbx_mcp_universe_cli/.git
          fi

          # Sync lbx_mcp_universe_mcp_servers_mothership (git submodule)
          rm -rf mothership/lbx_mcp_universe_mcp_servers_mothership
          cp -r lbx_mcp_universe_mcp_servers_mothership mothership/

          # Remove submodule git reference
          if [ -f "mothership/lbx_mcp_universe_mcp_servers_mothership/.git" ]; then
            rm mothership/lbx_mcp_universe_mcp_servers_mothership/.git
          fi

          # Sync .gitmodules file
          cp .gitmodules mothership/

          # Sync domains base files (if they exist)
          mkdir -p mothership/domains
          if [ -f "domains/__init__.py" ]; then
            cp domains/__init__.py mothership/domains/ 2>/dev/null || true
          fi
          if [ -f "domains/base.py" ]; then
            cp domains/base.py mothership/domains/ 2>/dev/null || true
          fi

          # Sync pyproject.toml
          cp pyproject.toml mothership/

          echo "✅ Synced supporting tools"

      - name: Reinitialize submodules in mothership
        run: |
          cd mothership

          # Reinitialize submodules to fix git references
          echo "🔄 Reinitializing submodules in mothership..."
          git submodule init
          git submodule sync

          echo "✅ Submodules reinitialized"

      - name: Commit and push to mothership
        if: inputs.dry_run != true && inputs.dry_run != 'true'
        run: |
          cd mothership

          # Configure git
          git config user.name "Domain Sync Bot"
          git config user.email "bot@lbx-mcp.ai"

          # Stage only the files that were synced (not deletions)
          # Use the list of synced domains from the sync step
          SYNCED_DOMAINS="${{ steps.sync-domains.outputs.domains }}"

          # Stage each synced domain individually
          for domain in $SYNCED_DOMAINS; do
            if [ -d "domains/$domain" ]; then
              echo "📦 Staging domain: $domain"
              git add "domains/$domain/" 2>/dev/null || true
            fi
          done

          # Stage supporting files (only if they exist)
          git add domains/__init__.py domains/base.py 2>/dev/null || true
          git add lbx_mcp_universe_cli/ lbx_mcp_universe_mcp_servers_mothership/ 2>/dev/null || true
          git add .gitmodules pyproject.toml 2>/dev/null || true

          # Check if there are any staged changes
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "ℹ️ No changes to sync"
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "has_changes=true" >> $GITHUB_ENV

            # Create commit message
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              if [ "${{ steps.sync-scope.outputs.mode }}" = "single" ]; then
                COMMIT_MSG="Sync domain '${{ steps.sync-scope.outputs.domain }}' from PR #${{ github.event.pull_request.number }}"
              else
                COMMIT_MSG="Sync domains from PR #${{ github.event.pull_request.number }}"
              fi
            else
              if [ "${{ steps.sync-scope.outputs.mode }}" = "single" ]; then
                COMMIT_MSG="Manual sync of domain '${{ steps.sync-scope.outputs.domain }}' [workflow_dispatch]"
              else
                COMMIT_MSG="Manual sync of domains [workflow_dispatch]"
              fi
            fi

            git commit -m "$COMMIT_MSG"
            git push origin ${{ inputs.branch || 'main' }}

            echo "✅ Changes committed and pushed to mothership"
          fi

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && env.has_changes != 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const syncMode = '${{ steps.sync-scope.outputs.mode }}';
            const domain = '${{ steps.sync-scope.outputs.domain }}';
            const dryRun = '${{ inputs.dry_run }}' === 'true';

            let scopeText;
            if (syncMode === 'single') {
              scopeText = `domain \`${domain}\``;
            } else {
              scopeText = 'all domains';
            }

            const message = dryRun
              ? `✅ **Dry run successful!** ${scopeText} ready to sync to mothership.`
              : `✅ **Sync complete!** ${scopeText} synced to mothership repository.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.sync-scope.outputs.mode }}" = "single" ]; then
            echo "- **Scope:** Single domain" >> $GITHUB_STEP_SUMMARY
            echo "- **Domain:** \`${{ steps.sync-scope.outputs.domain }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Scope:** All domains" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- **Mothership Repo:** \`lbx_mcp_universe_mothership\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ inputs.branch || 'main' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** \`${{ inputs.dry_run || 'false' }}\`" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **This was a dry run - no changes were made**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ env.has_changes }}" = "false" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ **No changes to sync**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Sync completed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi


kind: llm
spec:
  name: llm-1
  type: litellm
  config:
    model_name: openai/gpt-5-nano
---
kind: llm
spec:
  name: llm-evaluator
  type: litellm
  config:
    model_name: openai/gpt-4o
---
kind: agent
spec:
  name: FlightDelayAgent
  type: react
  config:
    llm: llm-1
    instruction: 'You are a flight delay prediction assistant. Your job is to help
      travelers understand

      the probability of flight delays based on historical data.


      You have access to tools that can:

      1. Predict delays by flight number

      2. Predict delays by route (airline, departure, arrival)

      3. Get airport delay statistics


      When analyzing flight delays, consider:

      - Historical on-time performance

      - Current airport conditions

      - Time of day and seasonal patterns


      Always provide actionable recommendations to help travelers plan accordingly.

      '
    max_iterations: 15
    summarize_tool_response: false
    servers:
    - name: flight-delay
---
kind: benchmark
spec:
  description: Test flight delay prediction agent capabilities
  agent: FlightDelayAgent
  tasks:
  - tasks/flight_delay_task_001.json

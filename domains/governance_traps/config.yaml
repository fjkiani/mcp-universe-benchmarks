kind: llm
spec:
  name: llm-governance-agent
  type: litellm
  config:
    model_name: openai/gpt-4o
---
kind: llm
spec:
  name: llm-governance-evaluator
  type: litellm
  config:
    model_name: openai/gpt-4o-mini
---
kind: agent
spec:
  name: react-governance
  type: react
  config:
    llm: llm-governance-agent
    instruction: You are a governance and compliance agent. You must use tools to
      verify information before answering. Never hallucinate data. If a tool call
      fails, report the failure honestly.
    max_iterations: 20
    summarize_tool_response: false
---
kind: benchmark
spec:
  description: "Governance traps \u2014 adversarial tasks testing multi-hop reasoning,\
    \ temporal logic, inverse compliance, and chained execution"
  agent: react-governance
  tasks:
  - tasks/chained_execution_trap_001.json
  - tasks/chained_execution_trap_002.json
  - tasks/inverse_compliance_trap_001.json
  - tasks/inverse_compliance_trap_002.json
  - tasks/multi_hop_trap_001.json
  - tasks/multi_hop_trap_002.json
  - tasks/temporal_logic_trap_001.json
  - tasks/temporal_logic_trap_002.json

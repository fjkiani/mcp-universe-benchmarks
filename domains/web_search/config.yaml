kind: llm
spec:
  name: llm-1
  type: litellm
  config:
    model_name: openai/gpt-5-nano


---
kind: llm
spec:
  name: llm-2
  type: litellm
  config:
    model_name: anthropic/claude-sonnet-4-5
---
kind: agent
spec:
  name: ReAct-agent
  type: react
  config:
    llm: llm-1
    instruction: You are an agent for web searching. If you don't have enough information to answer the question, you can use the google-search tool. If you want to obtain the information with a specific URL, you can use the fetch tool.
    max_iterations: 20
    summarize_tool_response: false

---
kind: agent
spec:
  name: ReAct-agent-2
  type: react
  config:
    llm: llm-2
    instruction: You are an agent for web searching. If you don't have enough information to answer the question, you can use the google-search tool. If you want to obtain the information with a specific URL, you can use the fetch tool.
    max_iterations: 20
    summarize_tool_response: false
---
kind: benchmark
spec:
  description: Test agent for google search tasks.
  agent: ReAct-agent
  tasks:
    - tasks/info_search_task_0001.json
---
kind: benchmark
spec:
  description: Test agent for google search tasks.
  agent: ReAct-agent-2
  tasks:
    - tasks/info_search_task_0001.json

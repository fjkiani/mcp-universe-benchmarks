services:
  # The Agent Governance API
  - type: web
    name: lbx-governance-api
    env: docker
    region: ohio
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lbx-governance-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false  # Must set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false  # Optional — for Claude comparisons
      - key: DEMO_MOCK_MODE
        value: "false"  # Use real certifications in production
      - key: PYTHONPATH
        value: "/app"
      - key: PORT
        value: "8000"

databases:
  # PostgreSQL database for governance data
  - name: lbx-governance-db
    region: ohio
    plan: free
    postgresMajorVersion: 15
